<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Bhai! 🎉</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24);
            background-size: 400% 400%;
            animation: gradientShift 5s ease infinite;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 { font-size: 4em; margin: 0; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
        p { font-size: 1.5em; margin: 20px 0; }
        .cake { font-size: 6em; animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        button { 
            background: #ff9ff3; 
            border: none; 
            padding: 15px 30px; 
            font-size: 1.2em; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        button:hover { background: #ff6b9d; transform: scale(1.1); }
        #message { display: none; font-size: 2em; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>🎂 Happy Birthday Dost! 🎂</h1>
    <div class="cake">🍰</div>
    <p>Tere liye special din! Tu best hai bhai.</p>
    <button onclick="showMessage()">Surprise Kholo! 🎁</button>
    <div id="message">Tu mera sabse acha friend hai! Hamesha saath rahe! 🥳🥳</div>

    <script>
        function showMessage() {
            document.getElementById('message').style.display = 'block';
            confettiEffect();
        }
        function confettiEffect() {
            // Simple confetti using CSS particles
            for(let i=0; i<100; i++) {
                let confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.background = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#ff9ff3'][Math.floor(Math.random()*5)];
                confetti.style.borderRadius = '50%';
                confetti.style.pointerEvents = 'none';
                confetti.style.animation = `fall ${Math.random()*3 + 2}s linear forwards`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }
        // Add falling animation
        let style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);   
</script>

</body>
</html>
